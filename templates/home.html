<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nykaa Clone</title>
    <style>
        /* Basic styles for the navbar */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ff5f8d;
            padding: 10px 20px;
            color: white;
        }
        .navbar .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .navbar .links {
            display: flex;
            gap: 15px;
        }
        .navbar .links a {
            text-decoration: none;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">Nykaa Clone</div>
        <div class="links">
            <a href="#">Home</a>
            <a href="#">Makeup</a>
            <a href="#">Skincare</a>
            <a href="#">Hair</a>
            <a href="#">Login</a>
        </div>
    </div>
</body>
</html>
